name: Validate redroid arm64 + Free Fire

# Roda num runner ARM64 GRATIS (repos publicos). Sobe redroid arm64 (Android
# nativo, sem traducao x86), instala o FF e checa se ele PASSA do anti-cheat
# (o ponto que crashava no x86 com PR_SET_SECCOMP).
#
# Dispare manualmente (Actions -> Validate -> Run workflow) passando a URL do APK.

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: "URL de download direto do APK universal do Free Fire"
        required: true
      redroid_tag:
        description: "Tag da imagem redroid arm64"
        required: false
        default: "redroid/redroid:11.0.0-arm64"
      observe_seconds:
        description: "Segundos observando o processo apos o launch"
        required: false
        default: "150"

jobs:
  validate:
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 45
    steps:
      - name: Host info
        run: |
          set -x
          uname -a
          nproc
          free -h
          echo "arch: $(dpkg --print-architecture)"

      - name: Load binder kernel module
        run: |
          set -x
          sudo apt-get update -y
          sudo apt-get install -y adb || true
          # binder costuma estar em linux-modules-extra do kernel atual
          sudo apt-get install -y "linux-modules-extra-$(uname -r)" || true
          sudo modprobe binder_linux devices="binder,hwbinder,vndbinder" \
            || sudo modprobe binder || true
          ls -l /dev/binder* || echo "AVISO: sem nodes de binder — redroid pode nao bootar"

      - name: Start redroid (arm64 nativo)
        run: |
          set -x
          docker run -d --privileged --name redroid \
            -p 5555:5555 \
            "${{ inputs.redroid_tag }}" \
            androidboot.redroid_width=1280 \
            androidboot.redroid_height=720 \
            androidboot.redroid_dpi=240 \
            androidboot.redroid_gpu_mode=guest
          sleep 25
          docker logs redroid 2>&1 | tail -60

      - name: Connect ADB + wait boot
        run: |
          set -x
          adb start-server
          adb connect localhost:5555
          for i in $(seq 1 60); do
            b=$(adb -s localhost:5555 shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            echo "try $i boot_completed=[$b]"
            [ "$b" = "1" ] && break
            sleep 5
          done
          echo "ABI nativa do device:"
          adb -s localhost:5555 shell getprop ro.product.cpu.abi
          adb -s localhost:5555 shell getprop ro.product.cpu.abilist

      - name: Download + install Free Fire
        run: |
          set -x
          curl -L --fail -o ff.apk "${{ inputs.apk_url }}"
          ls -lh ff.apk
          adb -s localhost:5555 install -r ff.apk

      - name: Launch + observe (teste decisivo)
        run: |
          set -x
          adb -s localhost:5555 shell monkey -p com.dts.freefireth -c android.intent.category.LAUNCHER 1
          sleep "${{ inputs.observe_seconds }}"
          echo "=== processo vivo? ==="
          if adb -s localhost:5555 shell "pidof com.dts.freefireth" | grep -q .; then
            echo "RESULT=FF_ALIVE" | tee -a result.txt
          else
            echo "RESULT=FF_DIED" | tee -a result.txt
          fi
          echo "=== exit-info ==="
          adb -s localhost:5555 shell dumpsys activity exit-info com.dts.freefireth > exit-info.txt 2>&1 || true
          echo "=== crash buffer ==="
          adb -s localhost:5555 logcat -d -b crash > crash.log 2>&1 || true
          echo "=== grep anti-cheat/seccomp ==="
          adb -s localhost:5555 logcat -d 2>/dev/null | grep -iE "seccomp|PR_SET_SECCOMP|GGP|il2cpp|SIGABRT|SIGSEGV|FATAL|ndk_translation" | tail -80 > grep.log || true
          echo "=== screenshot ==="
          adb -s localhost:5555 exec-out screencap -p > screen.png 2>/dev/null || true
          ls -l screen.png || true

      - name: Veredito
        run: |
          echo "## Resultado da validacao" >> "$GITHUB_STEP_SUMMARY"
          cat result.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -iE "seccomp|SIGABRT|SIGSEGV" grep.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(sem seccomp/abort no log — bom sinal)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: |
            result.txt
            exit-info.txt
            crash.log
            grep.log
            screen.png
