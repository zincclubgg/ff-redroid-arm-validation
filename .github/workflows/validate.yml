name: Validate redroid arm64 + Free Fire

# Compatibility check only. The workflow starts redroid arm64, installs the APK
# from a draft release asset, launches the game, and uploads logs/screenshots.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Draft release tag containing freefire.apk"
        required: false
        default: "ff-apk-v1"
      redroid_tag:
        description: "redroid arm64 image tag"
        required: false
        default: "redroid/redroid:12.0.0_64only-latest"
      observe_seconds:
        description: "Seconds to observe the game process after launch"
        required: false
        default: "150"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 25
    steps:
      - name: Initialize artifacts
        run: |
          : > result.txt
          : > exit-info.txt
          : > crash.log
          : > grep.log
          : > adb-devices.txt
          : > redroid-container.log
          : > redroid-props.txt
          : > redroid-processes.txt
          : > redroid-devices.txt
          : > android-logcat.txt
          : > android-tombstones.txt
          : > host-dmesg.txt

      - name: Host info
        run: |
          set -x
          uname -a
          nproc
          free -h
          echo "arch: $(dpkg --print-architecture)"

      - name: Load binder kernel module
        run: |
          set -x
          sudo apt-get update -y
          sudo apt-get install -y adb || true
          if ! modinfo binder_linux >/dev/null 2>&1; then
            sudo apt-get install -y "linux-modules-extra-$(uname -r)"
          fi
          sudo modprobe binder_linux devices="binder,hwbinder,vndbinder"
          grep -w binder /proc/filesystems

          sudo mkdir -p /dev/binderfs
          if ! mountpoint -q /dev/binderfs; then
            sudo mount -t binder binder /dev/binderfs
          fi
          ls -la /dev/binderfs
          for device in binder hwbinder vndbinder; do
            test -c "/dev/binderfs/$device"
          done

      - name: Start redroid arm64
        run: |
          set -x
          timeout 6m docker pull "${{ inputs.redroid_tag }}"
          docker image inspect "${{ inputs.redroid_tag }}" --format '{{json .Architecture}} {{json .Os}}'
          docker run -d --privileged --name redroid \
            -p 5555:5555 \
            -v /dev/binderfs/binder:/dev/binder \
            -v /dev/binderfs/hwbinder:/dev/hwbinder \
            -v /dev/binderfs/vndbinder:/dev/vndbinder \
            "${{ inputs.redroid_tag }}" \
            androidboot.use_memfd=1 \
            androidboot.redroid_width=1280 \
            androidboot.redroid_height=720 \
            androidboot.redroid_dpi=240 \
            androidboot.redroid_gpu_mode=guest
          sleep 25
          docker ps -a
          docker logs redroid 2>&1 | tail -80
          docker inspect redroid --format 'status={{.State.Status}} exit={{.State.ExitCode}} error={{.State.Error}}'
          test "$(docker inspect redroid --format '{{.State.Running}}')" = "true"

      - name: Connect ADB and wait boot
        run: |
          set -x
          target=127.0.0.1:5555
          adb start-server
          booted=""
          for i in $(seq 1 18); do
            timeout 3s adb connect "$target" || true
            state=$(timeout 2s adb -s "$target" get-state 2>&1 || true)
            if [ "$state" = "device" ]; then
              booted=$(timeout 2s adb -s "$target" shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)
            else
              booted=""
            fi
            echo "try $i state=[$state] boot_completed=[$booted]"
            [ "$booted" = "1" ] && break
            sleep 5
          done
          adb devices -l | tee adb-devices.txt
          test "$booted" = "1"
          echo "Native ABI:"
          adb -s "$target" shell getprop ro.product.cpu.abi
          adb -s "$target" shell getprop ro.product.cpu.abilist

      - name: Collect redroid boot diagnostics
        if: failure()
        run: |
          docker ps -a
          docker inspect redroid || true
          docker logs redroid > redroid-container.log 2>&1 || true
          timeout 5s docker exec redroid getprop > redroid-props.txt 2>&1 || true
          timeout 5s docker exec redroid ps -A > redroid-processes.txt 2>&1 || true
          timeout 5s docker exec redroid sh -c \
            'ls -la /dev/binder* /dev/binderfs 2>&1; stat /dev/binder /dev/hwbinder /dev/vndbinder 2>&1' \
            > redroid-devices.txt 2>&1 || true
          timeout 10s docker exec redroid logcat -b all -d > android-logcat.txt 2>&1 || true
          timeout 10s docker exec redroid sh -c \
            'ls -la /data/tombstones 2>&1; for f in /data/tombstones/tombstone_*; do echo ===$f===; cat "$f"; done' \
            > android-tombstones.txt 2>&1 || true
          sudo dmesg --ctime | tail -300 > host-dmesg.txt 2>&1 || true
          adb devices -l > adb-devices.txt 2>&1 || true
          echo "=== redroid props ==="
          tail -80 redroid-props.txt || true
          echo "=== redroid processes ==="
          tail -80 redroid-processes.txt || true
          echo "=== redroid logs ==="
          tail -120 redroid-container.log || true
          echo "=== binder devices ==="
          cat redroid-devices.txt || true
          echo "=== Android fatal logs ==="
          grep -iE "fatal|abort|binder|servicemanager|hwservicemanager|signal 6|SIGABRT" android-logcat.txt | tail -160 || true
          echo "=== tombstones ==="
          tail -160 android-tombstones.txt || true
          echo "=== host dmesg ==="
          tail -120 host-dmesg.txt || true

      - name: Download and install Free Fire
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -x
          gh release download "${{ inputs.release_tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern freefire.apk \
            --dir .
          ls -lh ff.apk
          adb -s localhost:5555 install -r ff.apk

      - name: Launch and observe
        run: |
          set -x
          adb -s localhost:5555 shell monkey -p com.dts.freefireth -c android.intent.category.LAUNCHER 1
          sleep "${{ inputs.observe_seconds }}"

          echo "=== process alive? ==="
          if adb -s localhost:5555 shell "pidof com.dts.freefireth" | grep -q .; then
            echo "RESULT=FF_ALIVE" | tee result.txt
          else
            echo "RESULT=FF_DIED" | tee result.txt
          fi

          echo "=== exit-info ==="
          adb -s localhost:5555 shell dumpsys activity exit-info com.dts.freefireth > exit-info.txt 2>&1 || true
          echo "=== crash buffer ==="
          adb -s localhost:5555 logcat -d -b crash > crash.log 2>&1 || true
          echo "=== crash/seccomp signals ==="
          adb -s localhost:5555 logcat -d 2>/dev/null \
            | grep -iE "seccomp|PR_SET_SECCOMP|GGP|il2cpp|SIGABRT|SIGSEGV|FATAL|ndk_translation" \
            | tail -120 > grep.log || true
          echo "=== screenshot ==="
          adb -s localhost:5555 exec-out screencap -p > screen.png 2>/dev/null || true
          ls -l screen.png || true

      - name: Summary
        if: always()
        run: |
          echo "## Validation result" >> "$GITHUB_STEP_SUMMARY"
          cat result.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -iE "seccomp|SIGABRT|SIGSEGV|FATAL" grep.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null \
            || echo "(no crash/seccomp signal captured)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: |
            result.txt
            exit-info.txt
            crash.log
            grep.log
            screen.png
            adb-devices.txt
            redroid-container.log
            redroid-props.txt
            redroid-processes.txt
            redroid-devices.txt
            android-logcat.txt
            android-tombstones.txt
            host-dmesg.txt
